<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strain Adventures – Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1b1b1b;
      color: #ffffff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin: 12px 0;
    }

    .zone {
      margin: 12px auto;
      padding: 10px;
      border: 1px solid #444;
      max-width: 960px;
      background: #222;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 120px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      margin: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>Strain Adventures – POC</h1>

  <div class="zone">
    <strong>Coins:</strong> <span id="coins">0</span>
  </div>

  <div class="zone">
    <button onclick="buyPack()">Buy Pack (10 cards – 20 coins)</button>
    <button onclick="betCoins()">Bet 10 coins (50/50)</button>
  </div>

  <div class="zone">
    <h3>Your Hand</h3>
    <div id="hand" class="cards"></div>
  </div>

  <div class="zone">
    <h3>Cards in Play (max 4)</h3>
    <div id="cardsInPlay" class="cards"></div>
    <button onclick="endTurn()">End Turn</button>
  </div>

<script>
/* =========================
   GLOBAL STATE
   ========================= */

let DECK = [];
let CARD_BACK = null;

let coins = 100;
let drawPile = [];
let hand = [];
let cardsInPlay = [];

/* =========================
   LOAD DECK.JSON
   ========================= */

async function loadDeck() {
  const response = await fetch("data/deck.json");
  const data = await response.json();

  DECK = data.cards;
  CARD_BACK = data.cardBack || null;

  console.log("Deck loaded:", DECK.length, "cards");
}

/* =========================
   UTILITIES
   ========================= */

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

/* =========================
   GAME INIT
   ========================= */

function initGame() {
  drawPile = shuffle([...DECK]);
  hand = [];
  cardsInPlay = [];
  updateCoins();
}

/* =========================
   ECONOMY
   ========================= */

function buyPack() {
  if (coins < 20) {
    alert("Not enough coins");
    return;
  }

  coins -= 20;
  updateCoins();

  const pack = shuffle([...DECK]).slice(0, 10);
  hand = pack;
  renderHand();
}

function betCoins() {
  if (coins < 10) {
    alert("Not enough coins to bet");
    return;
  }

  coins -= 10;

  if (Math.random() > 0.5) {
    coins += 25;
    alert("You won the bet!");
  } else {
    alert("You lost the bet");
  }

  updateCoins();
}

/* =========================
   RENDERING
   ========================= */

function renderHand() {
  const el = document.getElementById("hand");
  el.innerHTML = "";

  hand.forEach((card, index) => {
    const img = document.createElement("img");
    img.src = card.image;
    img.className = "card";
    img.title = card.name || card.cardTitle;
    img.onclick = () => playCard(index);
    el.appendChild(img);
  });
}

function renderCardsInPlay() {
  const el = document.getElementById("cardsInPlay");
  el.innerHTML = "";

  cardsInPlay.forEach(card => {
    const img = document.createElement("img");
    img.src = card.image;
    img.className = "card";
    el.appendChild(img);
  });
}

/* =========================
   GAME FLOW
   ========================= */

function playCard(handIndex) {
  if (cardsInPlay.length >= 4) {
    alert("Maximum 4 cards in play");
    return;
  }

  const card = hand.splice(handIndex, 1)[0];
  cardsInPlay.push(card);

  renderHand();
  renderCardsInPlay();
}

function endTurn() {
  // Stub for opponent / stat resolution later
  alert("Opponent turn (mechanics coming later)");
}

/* =========================
   STARTUP
   ========================= */

window.onload = async () => {
  await loadDeck();
  initGame();
};
</script>

</body>
</html>
