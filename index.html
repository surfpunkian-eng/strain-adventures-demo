<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strain Adventures – Demo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🌿</text></svg>">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1b1b1b;
      color: #ffffff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 { margin: 12px 0; }

    .zone {
      margin: 12px auto;
      padding: 10px;
      border: 1px solid #444;
      max-width: 960px;
      background: #222;
      border-radius: 10px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 120px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .card:hover { transform: scale(1.05); }

    button {
      margin: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
    }
    button:hover { background: #1c1c1c; }

    /* Leaderboard styling */
    .lb-row { display:flex; gap:12px; justify-content:space-between; align-items:center; flex-wrap:wrap; }
    .lb-input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      min-width: 220px;
    }
    .lb-cols { display:flex; gap:18px; flex-wrap:wrap; margin-top:10px; justify-content:center; }
    .lb-col { min-width: 260px; text-align:left; background:#1c1c1c; border:1px solid #333; border-radius:10px; padding:10px; }
    .lb-col h4 { margin: 0 0 8px 0; font-size: 13px; opacity:.9; letter-spacing:.04em; text-transform:uppercase;}
    .lb-status { font-size: 12px; opacity:.85; margin-top:8px; }
    ol { margin:0; padding-left: 18px; }
    li { margin: 4px 0; font-size: 13px; }
    .muted { opacity:.8; font-size:12px; }
  </style>
</head>

<body>

  <h1>Strain Adventures – POC</h1>

  <div class="zone">
    <strong>Coins:</strong> <span id="coins">0</span>
    <div class="muted">POC scoring: submit your current coins as your leaderboard score</div>
  </div>

  <div class="zone">
    <button onclick="buyPack()">Buy Pack (10 cards – 20 coins)</button>
    <button onclick="betCoins()">Bet 10 coins (50/50)</button>
  </div>

  <div class="zone">
    <h3>Your Hand</h3>
    <div id="hand" class="cards"></div>
  </div>

  <div class="zone">
    <h3>Cards in Play (max 4)</h3>
    <div id="cardsInPlay" class="cards"></div>
    <button onclick="endTurn()">End Turn</button>
  </div>

  <!-- Leaderboard Panel -->
  <div class="zone" id="leaderboardPanel">
    <div class="lb-row">
      <div style="text-align:left;">
        <strong>Leaderboard</strong>
        <div class="muted">CheddaBoards (Top 10 + your rank)</div>
      </div>
      <div>
        <input id="lbNickname" class="lb-input" placeholder="Your name (max 20 chars)" maxlength="20" />
        <button id="btnSubmitScore">Submit coins score</button>
        <button id="btnRefreshLB">Refresh</button>
      </div>
    </div>

    <div id="lbStatus" class="lb-status"></div>

    <div class="lb-cols">
      <div class="lb-col">
        <h4>Top 10</h4>
        <ol id="lbTop10"></ol>
      </div>
      <div class="lb-col">
        <h4>You</h4>
        <div id="lbMe">—</div>
      </div>
    </div>
  </div>

<script>
/* =========================
   GLOBAL STATE
   ========================= */

let DECK = [];
let CARD_BACK = null;

let coins = 100;
let drawPile = [];
let hand = [];
let cardsInPlay = [];

/* =========================
   LOAD DECK.JSON
   ========================= */

async function loadDeck() {
  // Prefer relative path for GitHub Pages; fallback for older absolute paths
  const candidates = [
    "./data/deck.json",
    "/strain-adventures-demo/data/deck.json"
  ];

  let lastErr = null;
  for (const url of candidates) {
    try {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status} for ${url}`);
      const data = await response.json();

      DECK = data.cards || [];
      CARD_BACK = data.cardBack || null;

      console.log("Deck loaded:", DECK.length, "cards from", url);
      return;
    } catch (e) {
      lastErr = e;
    }
  }
  console.error("Failed to load deck.json:", lastErr);
  alert("Could not load deck.json. Check that /data/deck.json exists in the repo.");
}

/* =========================
   UTILITIES
   ========================= */

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
  // keep a convenient “lastKnownScore” in sync for leaderboard submission
  lastKnownScore = coins;
}

/* =========================
   GAME INIT
   ========================= */

function initGame() {
  drawPile = shuffle([...DECK]);
  hand = [];
  cardsInPlay = [];
  updateCoins();
}

/* =========================
   ECONOMY
   ========================= */

function buyPack() {
  if (coins < 20) {
    alert("Not enough coins");
    return;
  }

  coins -= 20;
  updateCoins();

  const pack = shuffle([...DECK]).slice(0, 10);
  hand = pack;
  renderHand();
}

function betCoins() {
  if (coins < 10) {
    alert("Not enough coins to bet");
    return;
  }

  coins -= 10;

  if (Math.random() > 0.5) {
    coins += 25;
    alert("You won the bet!");
  } else {
    alert("You lost the bet");
  }

  updateCoins();
}

/* =========================
   RENDERING
   ========================= */

function renderHand() {
  const el = document.getElementById("hand");
  el.innerHTML = "";

  hand.forEach((card, index) => {
    const img = document.createElement("img");
    img.src = card.image;
    img.className = "card";
    img.title = card.name || card.cardTitle || "Card";
    img.onclick = () => playCard(index);
    el.appendChild(img);
  });
}

function renderCardsInPlay() {
  const el = document.getElementById("cardsInPlay");
  el.innerHTML = "";

  cardsInPlay.forEach(card => {
    const img = document.createElement("img");
    img.src = card.image;
    img.className = "card";
    img.title = card.name || card.cardTitle || "In play";
    el.appendChild(img);
  });
}

/* =========================
   GAME FLOW
   ========================= */

function playCard(handIndex) {
  if (cardsInPlay.length >= 4) {
    alert("Maximum 4 cards in play");
    return;
  }

  const card = hand.splice(handIndex, 1)[0];
  cardsInPlay.push(card);

  renderHand();
  renderCardsInPlay();
}

function endTurn() {
  // Stub for opponent / stat resolution later
  alert("Opponent turn (mechanics coming later)");
}

/* =========================
   CHEDDABOARDS LEADERBOARD
   =========================
   Uses CheddaBoards REST endpoints and header pattern per their SDK:
   Base: https://cheddaboards.com/.netlify/functions/api
   Header: X-API-Key
   Endpoints: POST /scores, GET /leaderboard, GET /players/{id}/rank
   [1](https://stackoverflow.com/questions/4604663/download-single-files-from-github)[2](https://github.com/cheddatech/CheddaBoards-Godot-Api/blob/main/cheddaboards.gd)
*/

const CHEDDA_BASE = "https://cheddaboards.com/.netlify/functions/api";
const CHEDDA_API_KEY = "cb_strain-adventures_3374400382";
const LB_SORT = "score";
const LB_LIMIT = 10;

let lastKnownScore = coins;

function getPlayerId() {
  const k = "strain_player_id";
  let id = localStorage.getItem(k);
  if (!id) {
    id = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ("p_" + Math.random().toString(36).slice(2));
    localStorage.setItem(k, id);
  }
  return id;
}

function setLBStatus(msg) {
  const el = document.getElementById("lbStatus");
  if (el) el.textContent = msg || "";
}

async function chedda(path, { method="GET", body=null } = {}) {
  const res = await fetch(CHEDDA_BASE + path, {
    method,
    headers: {
      "Content-Type": "application/json",
      "X-API-Key": CHEDDA_API_KEY
    },
    body: body ? JSON.stringify(body) : null
  });

  const json = await res.json().catch(() => null);
  if (!res.ok || !json || json.ok !== true) {
    const msg = (json && (json.error || (json.data && json.data.error))) || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return json.data;
}

async function submitCoinsScore() {
  const nickname = (document.getElementById("lbNickname")?.value || "").trim() || "Player";
  // POST /scores expects {playerId, score, streak, rounds?, nickname?} per SDK [1](https://stackoverflow.com/questions/4604663/download-single-files-from-github)[2](https://github.com/cheddatech/CheddaBoards-Godot-Api/blob/main/cheddaboards.gd)
  return chedda("/scores", {
    method: "POST",
    body: {
      playerId: getPlayerId(),
      score: Math.max(0, Math.floor(lastKnownScore)),
      streak: 0,
      nickname
    }
  });
}

async function fetchLeaderboard() {
  // GET /leaderboard?limit=&sort=... [1](https://stackoverflow.com/questions/4604663/download-single-files-from-github)[2](https://github.com/cheddatech/CheddaBoards-Godot-Api/blob/main/cheddaboards.gd)
  return chedda(`/leaderboard?limit=${LB_LIMIT}&sort=${encodeURIComponent(LB_SORT)}`);
}

async function fetchMyRank() {
  // GET /players/{id}/rank?sort=... [1](https://stackoverflow.com/questions/4604663/download-single-files-from-github)[2](https://github.com/cheddatech/CheddaBoards-Godot-Api/blob/main/cheddaboards.gd)
  const pid = encodeURIComponent(getPlayerId());
  return chedda(`/players/${pid}/rank?sort=${encodeURIComponent(LB_SORT)}`);
}

function renderTop10(entries) {
  const ol = document.getElementById("lbTop10");
  if (!ol) return;
  ol.innerHTML = "";
  (entries || []).forEach(e => {
    const li = document.createElement("li");
    const name = e.nickname || e.playerId || "Player";
    const val = (LB_SORT === "streak") ? e.streak : e.score;
    li.textContent = `${name} — ${val}`;
    ol.appendChild(li);
  });
}

function renderMe(rankData) {
  const el = document.getElementById("lbMe");
  if (!el) return;

  if (!rankData || rankData.rank == null) {
    el.textContent = "No rank yet — submit a score.";
    return;
  }
  const total = (rankData.totalPlayers != null) ? ` / ${rankData.totalPlayers}` : "";
  el.textContent = `Rank #${rankData.rank}${total}`;
}

async function refreshLeaderboardUI() {
  setLBStatus("Refreshing leaderboard...");
  const lb = await fetchLeaderboard();
  renderTop10(lb.leaderboard || []);
  const me = await fetchMyRank();
  renderMe(me);
  setLBStatus("Leaderboard updated.");
}

/* =========================
   STARTUP
   ========================= */

window.onload = async () => {
  await loadDeck();
  initGame();
  renderHand();
  renderCardsInPlay();

  // restore nickname
  const nickEl = document.getElementById("lbNickname");
  const savedNick = localStorage.getItem("strain_nickname") || "";
  if (nickEl) {
    nickEl.value = savedNick;
    nickEl.addEventListener("input", () => localStorage.setItem("strain_nickname", nickEl.value.trim()));
  }

  // wire buttons
  document.getElementById("btnSubmitScore")?.addEventListener("click", async () => {
    try {
      setLBStatus("Submitting score...");
      await submitCoinsScore();
      setLBStatus("Score submitted. Updating leaderboard...");
      await refreshLeaderboardUI();
    } catch (e) {
      setLBStatus("Error: " + e.message);
    }
  });

  document.getElementById("btnRefreshLB")?.addEventListener("click", async () => {
    try {
      await refreshLeaderboardUI();
    } catch (e) {
      setLBStatus("Error: " + e.message);
    }
  });

  // optional: pull leaderboard on load (comment out if you prefer)
  // refreshLeaderboardUI().catch(() => {});
};
</script>

</body>
</html>
