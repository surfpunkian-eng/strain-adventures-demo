<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strain Adventures – Demo</title>

  <style>
    :root{
      --green:#1f7a3f;
      --dark:#0f3d24;
      --cream:#f6f3ec;
    }
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--cream);
      color:#222;
    }
    header{
      background:var(--green);
      color:#fff;
      padding:12px 16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    header strong{ font-size:18px; }
    main{
      max-width:900px;
      margin:0 auto;
      padding:16px;
    }
    .zone{ margin-bottom:16px; }
    .zone h3{
      margin:0 0 8px 0;
      color:var(--dark);
    }
    .cards{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      min-height:160px;
    }
    .card{
      width:110px;
      height:150px;
      background:#fff;
      border-radius:8px;
      border:2px solid var(--dark);
      padding:6px;
      box-sizing:border-box;
      cursor:pointer;
      user-select:none;
    }
    .card.played{
      background:#dff2e6;
      cursor:default;
    }
    .card h4{
      font-size:12px;
      margin:0 0 4px 0;
      line-height:1.2;
    }
    .card p{
      font-size:11px;
      margin:0;
      line-height:1.2;
      opacity:0.9;
    }
    button{
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:6px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
    }
    button:disabled{
      background:#999;
      cursor:not-allowed;
    }
    .hint{
      margin-top:10px;
      font-size:12px;
      color:#444;
      opacity:0.9;
    }
    footer{
      text-align:center;
      font-size:12px;
      padding:12px;
      color:#555;
    }
  </style>
</head>

<body>
  <header>
    <strong>Strain Adventures</strong>
    <span>Demo version · by PapaHerb</span>
  </header>

  <main>
    <div class="zone">
      <h3>Your Hand</h3>
      <div id="hand" class="cards"></div>
    </div>

    <div class="zone">
      <h3>Cards in Play</h3>
      <div id="board" class="cards"></div>
    </div>

    <button id="endTurnBtn" disabled>End Turn</button>
    <div class="hint" id="hint">Tip: click one card to play it. End Turn becomes available after a play.</div>
  </main>

  <footer>
    Single-file demo · No backend · Proof of concept
  </footer>

  <script>
    // Hardened init: ensures DOM exists before we query elements
    window.addEventListener("DOMContentLoaded", () => {
      // Use plain ASCII quotes to avoid encoding edge cases
      const cards = [
        { id: 1, name: "Pink Malawi",    text: "Boosts energy this turn." },
        { id: 2, name: "Papa's Choice",  text: "Draw one extra card." },
        { id: 3, name: "Dead Card",      text: "No effect." },
        { id: 4, name: "Special Ability",text: "Play twice this turn." },
        { id: 5, name: "Strain Power",   text: "Control the board." },
        { id: 6, name: "Herb Stack",     text: "Score bonus points." }
      ];

      let hand = cards.slice(0, 6);
      let board = [];
      let playedThisTurn = false;

      const handEl = document.getElementById("hand");
      const boardEl = document.getElementById("board");
      const endTurnBtn = document.getElementById("endTurnBtn");
      const hintEl = document.getElementById("hint");

      function render() {
        handEl.innerHTML = "";
        boardEl.innerHTML = "";

        hand.forEach(card => {
          const el = document.createElement("div");
          el.className = "card";
          el.innerHTML = `<h4>${escapeHtml(card.name)}</h4><p>${escapeHtml(card.text)}</p>`;
          el.addEventListener("click", () => playCard(card.id));
          handEl.appendChild(el);
        });

        board.forEach(card => {
          const el = document.createElement("div");
          el.className = "card played";
          el.innerHTML = `<h4>${escapeHtml(card.name)}</h4><p>${escapeHtml(card.text)}</p>`;
          boardEl.appendChild(el);
        });

        endTurnBtn.disabled = !playedThisTurn;
        hintEl.textContent = playedThisTurn
          ? "Nice — click End Turn to continue."
          : "Tip: click one card to play it. End Turn becomes available after a play.";
      }

      function playCard(id) {
        if (playedThisTurn) return;
        const index = hand.findIndex(c => c.id === id);
        if (index === -1) return;

        board.push(hand[index]);
        hand.splice(index, 1);
        playedThisTurn = true;
        render();
      }

      endTurnBtn.addEventListener("click", () => {
        playedThisTurn = false;
        render();
      });

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#039;");
      }

      render();
    });
  </script>
</body>
</html>
