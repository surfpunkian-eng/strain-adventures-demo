<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strain Adventures – Demo</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>🌿</text></svg>">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1b1b1b;
      color: #ffffff;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 { margin: 12px 0; }

    .zone {
      margin: 12px auto;
      padding: 10px;
      border: 1px solid #444;
      max-width: 960px;
      background: #222;
      border-radius: 10px;
    }

    .muted {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .card {
      width: 120px;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.15s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card:hover { transform: scale(1.05); }

    button {
      margin: 6px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
    }
    button:hover { background: #1c1c1c; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Leaderboard UI */
    .lb-row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .lb-input {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #111;
      color: #fff;
      min-width: 220px;
    }
    .lb-status {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 8px;
      min-height: 16px;
    }
    .lb-cols {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 10px;
      justify-content: center;
    }
    .lb-col {
      min-width: 300px;
      text-align: left;
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
    }
    .lb-col h4 {
      margin: 0 0 8px 0;
      font-size: 13px;
      opacity: 0.9;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    ol { margin: 0; padding-left: 18px; }
    li { margin: 4px 0; font-size: 13px; }
    code {
      background: #111;
      border: 1px solid #333;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <h1>Strain Adventures – POC</h1>

  <div class="zone">
    <strong>Coins:</strong> <span id="coins">0</span>
    <div class="muted">
