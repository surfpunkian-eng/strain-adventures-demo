<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Strain Adventures – Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      text-align: center;
    }
    h1 { margin-top: 10px; }
    .zone {
      margin: 10px auto;
      padding: 10px;
      border: 1px solid #444;
      max-width: 900px;
    }
    .cards {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      width: 120px;
      cursor: pointer;
      border-radius: 6px;
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
    }
    button {
      padding: 8px 14px;
      margin: 5px;
      cursor: pointer;
    }
    .stats {
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <h1>Strain Adventures – POC</h1>

  <div class="zone">
    <strong>Coins:</strong> <span id="coins">100</span>
  </div>

  <div class="zone">
    <button onclick="buyPack()">Buy Pack (10 cards – 20 coins)</button>
    <button onclick="betCoins()">Bet 10 coins (50/50)</button>
  </div>

  <div class="zone">
    <h3>Your Hand</h3>
    <div id="hand" class="cards"></div>
  </div>

  <div class="zone">
    <h3>Cards in Play (max 4)</h3>
    <div id="cardsInPlay" class="cards"></div>
    <button onclick="endTurn()">End Turn</button>
  </div>

<script>
/* =========================
   CARD DATA (DECK)
   ========================= */

const DECK = [
  { id: "gushers", name: "Gushers", rarity: "Ultra Rare" },
  { id: "girl-scout-cookies", name: "Girl Scout Cookies", rarity: "Common" },
  { id: "gorilla-glue", name: "Gorilla Glue", rarity: "Common" },
  { id: "purple-haze", name: "Purple Haze", rarity: "Common" }
  // add the rest freely – filenames must match id
];

/* =========================
   GAME STATE
   ========================= */

let coins = 100;
let drawPile = [];
let hand = [];
let cardsInPlay = [];

/* =========================
   CORE FUNCTIONS
   ========================= */

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function updateCoins() {
  document.getElementById("coins").innerText = coins;
}

function initGame() {
  drawPile = shuffle(DECK);
  hand = [];
  cardsInPlay = [];
  updateCoins();
}

/* =========================
   PACK / ECONOMY LOGIC
   ========================= */

function buyPack() {
  if (coins < 20) {
    alert("Not enough coins");
    return;
  }
  coins -= 20;
  updateCoins();

  drawPile = shuffle([...DECK]);
  for (let i = 0; i < 10; i++) {
    if (drawPile.length > 0) {
      hand.push(drawPile.pop());
    }
  }
  renderHand();
}

function betCoins() {
  if (coins < 10) {
    alert("Not enough coins to bet");
    return;
  }
  coins -= 10;

  const win = Math.random() > 0.5;
  if (win) {
    coins += 25;
    alert("You won the bet!");
  } else {
    alert("You lost the bet");
  }
  updateCoins();
}

/* =========================
   RENDERING
   ========================= */

function renderHand() {
  const el = document.getElementById("hand");
  el.innerHTML = "";

  hand.forEach((card, index) => {
    const img = document.createElement("img");
    img.src = `assets/cards/${card.id}.png`;
    img.className = "card";
    img.title = card.name;
    img.onclick = () => playCard(index);
    el.appendChild(img);
  });
}

function renderCardsInPlay() {
  const el = document.getElementById("cardsInPlay");
  el.innerHTML = "";

  cardsInPlay.forEach(card => {
    const img = document.createElement("img");
    img.src = `assets/cards/${card.id}.png`;
    img.className = "card";
    el.appendChild(img);
  });
}

/* =========================
   GAME FLOW
   ========================= */

function playCard(index) {
  if (cardsInPlay.length >= 4) {
    alert("Maximum 4 cards in play");
    return;
  }
  const card = hand.splice(index, 1)[0];
  cardsInPlay.push(card);
  renderHand();
  renderCardsInPlay();
}

function endTurn() {
  // Placeholder for opponent + stat logic later
  alert("Opponent turn (stub)");
}

window.onload = initGame;
</script>

</body>
</html>
